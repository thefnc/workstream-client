<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Double Diamond Logo -->
  <g transform="translate(100, 100) rotate(45)">
    <!-- Filled diamond -->
    <rect x="-45" y="-15" width="60" height="60" fill="#0f172a" rx="8" />
    <!-- Outlined diamond -->
    <rect x="-15" y="-45" width="60" height="60" fill="none" stroke="#0f172a" stroke-width="8" rx="8" />
  </g>
</svg>